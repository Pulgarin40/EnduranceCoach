<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>EnduranceCoach</h1>
            <p>Crea tu cuenta de deportista</p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-control" formControlName="email" placeholder="tu@email.com"
                    autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" class="form-control" formControlName="password"
                    placeholder="Mínimo 6 caracteres" autocomplete="new-password">
            </div>

            <button type="submit" class="btn-primary" [disabled]="registerForm.invalid || isLoading">
                {{ isLoading ? 'Creando cuenta...' : 'Registrarse' }}
            </button>

            <div *ngIf="errorMessage" class="error-message">
                {{ errorMessage }}
            </div>
        </form>

        <div class="auth-footer">
            ¿Ya tienes una cuenta? <a routerLink="/login" class="auth-link">Inicia sesión</a>
        </div>
    </div>
</div>
