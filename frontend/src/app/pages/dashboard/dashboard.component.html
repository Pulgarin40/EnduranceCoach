<div class="dashboard-container">
    <nav class="dashboard-navbar">
        <div class="navbar-brand">
            <span class="brand-text">EnduranceCoach</span>
            <span class="brand-badge">PRO</span>
        </div>
        <div class="navbar-actions">
            <span class="user-greeting">Hola, {{ athleteName }}</span>
            <button class="btn-logout" (click)="logout()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"
                    class="logout-icon">
                    <path fill-rule="evenodd"
                        d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z" />
                    <path fill-rule="evenodd"
                        d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z" />
                </svg>
                Cerrar Sesión
            </button>
        </div>
    </nav>

    <main class="dashboard-content">
        <header class="dashboard-header">
            <h1>Panel de Control</h1>
            <p>Tu resumen deportivo actualizado</p>
        </header>

        <div class="cards-grid">
            <!-- Tarjeta: Mis Métricas -->
            <div class="dashboard-card metrics-card">
                <div class="card-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path
                            d="M11 2a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v12h.5a.5.5 0 0 1 0 1H.5a.5.5 0 0 1 0-1H1v-3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3h1V7a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7h1V2zm1 12h2V2h-2v12zm-3 0V7H7v7h2zm-5 0v-3H2v3h2z" />
                    </svg>
                </div>
                <div class="card-content">
                    <h3>Mis Métricas</h3>
                    <p>CTL, ATL, TSB y umbrales biométricos.</p>
                </div>
                <div class="card-action">
                    <button class="btn-card" routerLink="/metrics">Ver Análisis</button>
                </div>
            </div>

            <!-- Tarjeta: Plan de Entrenamiento -->
            <div class="dashboard-card training-card">
                <div class="card-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z" />
                        <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z" />
                    </svg>
                </div>
                <div class="card-content">
                    <h3>Plan de Entrenamiento</h3>
                    <p>Tus próximas sesiones: Ciclismo Ruta, Running y más.</p>
                </div>
                <div class="card-action">
                    <button class="btn-card" routerLink="/training">Ver Plan</button>
                </div>
            </div>

            <!-- Tarjeta: Plan de Nutrición -->
            <div class="dashboard-card nutrition-card">
                <div class="card-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path
                            d="M11.5 5.5v10h-7v-10h7ZM12 4H4v11.5A1.5 1.5 0 0 0 5.5 17h5a1.5 1.5 0 0 0 1.5-1.5V4ZM8.5 0a.5.5 0 0 1 .5.5V4H7V.5a.5.5 0 0 1 .5-.5Z" />
                        <path
                            d="M4 1.5A.5.5 0 0 1 4.5 2v2H3V2a.5.5 0 0 1 .5-.5ZM12 1.5a.5.5 0 0 1 .5.5v2h-1.5V2a.5.5 0 0 1 .5-.5ZM8 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" />
                    </svg>
                </div>
                <div class="card-content">
                    <h3>Plan de Nutrición</h3>
                    <p>Gramos de CH/h y avituallamientos sugeridos.</p>
                </div>
                <div class="card-action">
                    <button class="btn-card">Ver Nutrición</button>
                </div>
            </div>

        </div>
    </main>
</div>
