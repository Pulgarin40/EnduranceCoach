<div class="landing-login-container">
    <div class="overlay"></div>
    <div class="content-wrapper">
        <!-- Left Column: Inspiring Text -->
        <div class="hero-text-column">
            <h1 class="brand-title">EnduranceCoach AI</h1>
            <p class="hero-subtitle">
                Donde tu sudor se encuentra con nuestra ciencia. Analizamos tu potencial para diseñar el camino exacto
                hacia tu próxima meta.
            </p>
        </div>

        <!-- Right Column: Login Form Card -->
        <div class="form-column">
            <div class="glass-card">
                <div class="auth-header">
                    <h2>Bienvenido</h2>
                    <p>Inicia sesión en tu cuenta para continuar</p>
                </div>

                <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" formControlName="email"
                            placeholder="tu@email.com" autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" class="form-control" formControlName="password"
                            placeholder="Tu contraseña" autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || isLoading">
                        {{ isLoading ? 'Iniciando...' : 'Entrar' }}
                    </button>

                    <div *ngIf="errorMessage" class="error-message">
                        {{ errorMessage }}
                    </div>
                </form>

                <div class="auth-footer">
                    ¿No tienes una cuenta? <a routerLink="/register" class="auth-link">Regístrate aquí</a>
                </div>
            </div>
        </div>
    </div>
</div>
